name: janki_agro_tourism
description: Janki Agro Tourism Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  table_calendar: ^3.1.2
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - logo_512.png
flutter_icons:
  android: true
  image_path: "assets/images/logo.png"

  adaptive_icon_background: "#ffffff"   # keep white (same as your logo)
  adaptive_icon_foreground: "assets/images/logo.png"
